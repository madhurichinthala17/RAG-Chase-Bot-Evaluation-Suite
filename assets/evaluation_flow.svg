<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <style>
    .box { fill:#f6fbfb; stroke:#1f4d5e; stroke-width:2px; rx:14px; ry:14px; }
    .text { font: 15px 'Segoe UI', sans-serif; fill:#1f2f3a; }
    .title { font: 17px 'Segoe UI Bold', sans-serif; fill:#0f2a33; }
    .arrow { fill:none; stroke:#1f4d5e; stroke-width:2px; marker-end:url(#arr); }
  </style>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#1f4d5e" />
    </marker>
  </defs>
  <rect x="30" y="20" width="250" height="80" class="box" />
  <text x="155" y="45" text-anchor="middle" class="title">Gold dataset</text>
  <text x="155" y="70" text-anchor="middle" class="text">manual_goldens.json</text>

  <rect x="330" y="20" width="250" height="80" class="box" />
  <text x="455" y="45" text-anchor="middle" class="title">Testcase generation</text>
  <text x="455" y="70" text-anchor="middle" class="text">evaluation/pipelines/generate_testcases.py</text>

  <rect x="30" y="150" width="250" height="80" class="box" />
  <text x="155" y="175" text-anchor="middle" class="title">Evaluation runner</text>
  <text x="155" y="200" text-anchor="middle" class="text">evaluation/pipelines/runner.py</text>

  <rect x="330" y="150" width="250" height="80" class="box" />
  <text x="455" y="175" text-anchor="middle" class="title">DeepEval metrics</text>
  <text x="455" y="200" text-anchor="middle" class="text">Answer relevancy, faithfulness, recall</text>

  <rect x="630" y="90" width="220" height="100" class="box" />
  <text x="740" y="120" text-anchor="middle" class="title">Reports</text>
  <text x="740" y="145" text-anchor="middle" class="text">evaluation/reports/...</text>
  <text x="740" y="170" text-anchor="middle" class="text">failure analysis + summaries</text>

  <line x1="280" y1="60" x2="330" y2="60" class="arrow" />
  <line x1="155" y1="100" x2="155" y2="150" class="arrow" />
  <line x1="580" y1="190" x2="630" y2="190" class="arrow" />
</svg>